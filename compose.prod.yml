networks:
  filmony-network:
    driver: bridge

x-backend: &backend
  restart: unless-stopped
  networks:
    - filmony-network
  build:
    context: backend
    dockerfile: Dockerfile
    target: prod
  env_file:
    - vars/.env.production
  working_dir: /opt/app

services:
  filmony-backend:
    <<: *backend
    container_name: filmony-backend-prod
    command: python src/main.py
    ports:
      - '127.0.0.1:8000:8000'

  filmony-celery-worker:
    <<: *backend
    container_name: filmony-celery-worker-prod
    command: celery -A celery_app worker --loglevel=INFO
