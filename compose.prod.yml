networks:
  filmony-network:
    driver: bridge

volumes:
  filmony-pgdata-prod:
  filmony-rustfs-data-prod:
  filmony-redis-data-prod:

x-on-filmony-network: &on-filmony-network
  restart: unless-stopped
  networks:
    - filmony-network

x-backend-image: &backend-image
  <<: *on-filmony-network
  build:
    context: backend
    dockerfile: Dockerfile
    target: prod
  env_file:
    - vars/.env.production
  working_dir: /opt/app

x-app-with-deps: &app-with-deps
  <<: *backend-image
  depends_on:
    filmony-postgres:
      condition: service_healthy
    filmony-redis:
      condition: service_started
    filmony-rustfs:
      condition: service_started

services:
  filmony-postgres:
    <<: *on-filmony-network
    image: postgres:18-alpine
    container_name: filmony-postgres-prod
    env_file:
      - vars/.env.production
    volumes:
      - filmony-pgdata-prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10

  filmony-redis:
    <<: *on-filmony-network
    image: redis:8-alpine
    container_name: filmony-redis-prod
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - filmony-redis-data-prod:/data

  filmony-rustfs:
    <<: *on-filmony-network
    image: rustfs/rustfs:1.0.0-beta.1
    container_name: filmony-rustfs-prod
    volumes:
      - filmony-rustfs-data-prod:/data
    env_file:
      - vars/.env.production
    command: ['/data']

  filmony-backend:
    <<: *app-with-deps
    container_name: filmony-backend-prod
    command: python src/main.py

  filmony-celery-worker:
    <<: *app-with-deps
    container_name: filmony-celery-worker-prod
    command: celery -A celery_app worker --loglevel=INFO

  filmony-nginx:
    <<: *on-filmony-network
    image: nginx:1.27.5-alpine
    container_name: filmony-nginx-prod
    ports:
      - '127.0.0.1:8080:80'
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - filmony-backend
