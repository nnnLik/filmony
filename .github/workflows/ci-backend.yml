name: CI Backend

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --frozen --group dev

      - run: uv run ruff check --config pyproject.toml src/

      - run: uv run ruff format --config pyproject.toml --check src/

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: filmony
          POSTGRES_PASSWORD: filmony
          POSTGRES_DB: filmony_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U filmony -d filmony_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://filmony:filmony@localhost:5432/filmony_test
      DATABASE_TEST_URL: postgresql://filmony:filmony@localhost:5432/filmony_test
      CELERY_BROKER_URL: redis://127.0.0.1:6379/15
      TG_APP_TOKEN: ci-placeholder-token
      KINOPOISK_API_KEY: ci-placeholder-key
      KINOPOISK_API_BASE_URL: https://kinopoiskapiunofficial.tech/api
      RAWG_API_KEY: test
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --frozen --group dev --group prod

      - name: Run backend tests
        run: uv run pytest

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/coverage.xml
            backend/htmlcov/

      - name: Coverage summary
        if: always()
        run: |
          python3 <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          cov_path = Path("coverage.xml")

          with open(summary_path, "a", encoding="utf-8") as summary:
              summary.write("## Backend test coverage\n\n")
              if not cov_path.is_file():
                  summary.write("No `coverage.xml` report was generated.\n")
              else:
                  root = ET.parse(cov_path).getroot()
                  line_rate = float(root.attrib.get("line-rate", 0)) * 100
                  summary.write(f"**Total line coverage:** {line_rate:.2f}%\n")
          PY
