networks:
  app:
    driver: bridge

x-backend: &backend
  restart: unless-stopped
  networks:
    - app
  build:
    context: backend
    dockerfile: Dockerfile
    target: prod
  env_file:
    - vars/.env.production
  working_dir: /opt/app

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app
    command: ['redis-server', '--appendonly', 'yes']

  backend:
    <<: *backend
    command: python src/main.py
    ports:
      - '8100:8000'
    depends_on:
      - redis

  celery-worker:
    <<: *backend
    command: celery -A celery_app worker --loglevel=INFO
    depends_on:
      - redis
